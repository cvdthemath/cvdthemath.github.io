<!DOCTYPE html>
<html>
<head>
<title>cvdthemath</title>
</head>
<body style="background-color: #000000">
<h2 style="font-family: sans-serif; font-size: 100px; color: #FFFFFF" id="iteration">Iteration 0</h2>
<h1 style="font-family: sans-serif; font-size: 125px; color: #FFFFFF; text-align: center">Events</h1>
<p style="font-family: sans-serif; font-size: 70px; color: #FFFFFF">Here you can see the events currently being hosted</p>
<div style="display: flex; justify-content: center; width: 100%">
<div style="text-align: center; display: inline-box; width: 50vw">
<button style="color: #000000; background-color: #40EFFF; font-family: sans-serif; font-size: 60px; border: none; border-radius: 10px; width: 40vw; height: 20vw; margin: 5vw"
onclick="alert('Why did you click this?')">Nothing</button>
</div>
<div style="text-align: center; width: 50vw">
<button style="color: #000000; background-color: #036BFC; font-family: sans-serif; font-size: 60px; border: none; border-radius: 10px; width: 40vw; height: 20vw; margin: 5vw"
onclick="window.location.href=`https://cvdthemath.github.io?iteration=${parseInt(params.get('iteration')||0)+1}`">Recurse</button>
</div>
</div>
</body>
<script>
const params=new URLSearchParams(window.location.search);
document.getElementById("iteration").innerHTML=`Iteration ${params.get("iteration")||0}`;
</script>
</html>
