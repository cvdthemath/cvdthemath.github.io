<style>
.rainbowbutton {
    padding: 15px 30px;
    font-size: 18px;
    color: white;
    border: none;
    border-radius: 8px;
    animation: rainbow 5s infinite;
}
@keyframes rainbow {
    0%   { background: red; }
    16%  { background: orange; }
    33%  { background: yellow; color: black; }
    50%  { background: green; }
    66%  { background: blue; }
    83%  { background: indigo; }
    100% { background: violet; }
}
</style>
<body style="background-color: #000000">
