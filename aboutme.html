<!DOCTYPE html>
<html>
<head>
<title>cvdthemath</title>
<script>
let count=parseInt(sessionStorage.getItem('iteration'))||0;
const navigation=performance.getEntriesByType('navigation');
if (navigation.length>0) {
    const typ = navigation[0].type;
    if (typ==="back_forward") {
        count=Math.max(0, count-1);
    } else if (typ==="navigate") {
        count++;
    }
}
sessionStorage.setItem('iteration', count);
document.addEventListener("DOMContentLoaded", () => {
    const displayElement = document.getElementById("iteration");
    displayElement.innerHTML = `Iteration ${count}`;
});
</script>
</head>
<body style="background-color: #000000">
<h2 style="font-family: sans-serif; font-size: 100px; color: #FFFFFF" id="iteration">Iteration 0</h2>
<h1 style="font-family: sans-serif; font-size: 125px; color: #FFFFFF; text-align: center">About me</h1>
<p style="font-family: sans-serif; font-size: 70px; color: #FFFFFF">Uhh... I like math, I guess? Yeah thats all, I like math</p>
</html>
